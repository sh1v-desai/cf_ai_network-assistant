<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CF Network Assistant</title>
  <style>
    :root {
      --bg:      #0a0a0f;
      --bg2:     #111118;
      --bg3:     #1a1a24;
      --border:  #2a2a3a;
      --accent:  #f6821f;
      --accent2: #00d4ff;
      --text:    #e8e8f0;
      --muted:   #7a7a9a;
      --user-bg: #1a1a2e;
      --bot-bg:  #111118;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, sans-serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* header */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1rem 1.5rem;
      background: var(--bg2);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 0.7rem;
    }

    .logo-icon {
      width: 32px; height: 32px;
      background: var(--accent);
      border-radius: 6px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1rem;
    }

    .logo-text { font-weight: 700; font-size: 1rem; }
    .logo-sub  { font-size: 0.72rem; color: var(--muted); margin-top: 1px; }

    .header-right { display: flex; align-items: center; gap: 0.8rem; }

    .badge {
      font-size: 0.65rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 0.2rem 0.6rem;
      border-radius: 3px;
      border: 1px solid var(--border);
      color: var(--muted);
    }

    .badge.online {
      border-color: #3fb950;
      color: #3fb950;
    }

    .btn-reset {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
      padding: 0.3rem 0.8rem;
      border-radius: 4px;
      font-size: 0.75rem;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-reset:hover { border-color: #f85149; color: #f85149; }

    /* messages */
    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .messages::-webkit-scrollbar { width: 4px; }
    .messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .message {
      display: flex;
      gap: 0.8rem;
      max-width: 820px;
      animation: fadeIn 0.2s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .message.user  { align-self: flex-end; flex-direction: row-reverse; }
    .message.bot   { align-self: flex-start; }

    .avatar {
      width: 32px; height: 32px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.8rem;
      flex-shrink: 0;
      margin-top: 2px;
    }

    .avatar.user-av { background: var(--accent);  color: #000; font-weight: 700; }
    .avatar.bot-av  { background: var(--accent2); color: #000; }

    .bubble {
      padding: 0.75rem 1rem;
      border-radius: 8px;
      font-size: 0.88rem;
      line-height: 1.7;
      max-width: 680px;
      border: 1px solid var(--border);
    }

    .message.user .bubble {
      background: var(--user-bg);
      border-color: rgba(246,130,31,0.2);
    }

    .message.bot .bubble {
      background: var(--bot-bg);
    }

    /* code blocks inside responses */
    .bubble code {
      background: #0d1117;
      padding: 0.15rem 0.35rem;
      border-radius: 3px;
      font-family: 'Courier New', monospace;
      font-size: 0.82rem;
      color: var(--accent2);
    }

    .bubble pre {
      background: #0d1117;
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 1rem;
      overflow-x: auto;
      margin: 0.5rem 0;
      font-size: 0.8rem;
      line-height: 1.6;
    }

    .bubble pre code {
      background: transparent;
      padding: 0;
      color: #e6edf3;
    }

    /* typing indicator */
    .typing .bubble {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 0.75rem 1.2rem;
    }

    .dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--muted);
      animation: bounce 1.2s infinite;
    }
    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 80%, 100% { transform: translateY(0); }
      40%           { transform: translateY(-6px); }
    }

    /* suggested prompts */
    .suggestions {
      padding: 0 1.5rem 1rem;
      display: flex;
      gap: 0.6rem;
      flex-wrap: wrap;
      flex-shrink: 0;
    }

    .suggestion {
      font-size: 0.75rem;
      padding: 0.4rem 0.8rem;
      border: 1px solid var(--border);
      border-radius: 20px;
      color: var(--muted);
      cursor: pointer;
      transition: all 0.2s;
      background: transparent;
    }
    .suggestion:hover { border-color: var(--accent); color: var(--accent); }

    /* input area */
    .input-area {
      padding: 1rem 1.5rem 1.2rem;
      background: var(--bg2);
      border-top: 1px solid var(--border);
      flex-shrink: 0;
    }

    .input-row {
      display: flex;
      gap: 0.6rem;
      align-items: flex-end;
      max-width: 820px;
      margin: 0 auto;
    }

    textarea {
      flex: 1;
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-family: inherit;
      font-size: 0.9rem;
      padding: 0.7rem 1rem;
      resize: none;
      min-height: 44px;
      max-height: 140px;
      line-height: 1.5;
      outline: none;
      transition: border-color 0.2s;
    }
    textarea:focus { border-color: var(--accent); }
    textarea::placeholder { color: var(--muted); }

    .send-btn {
      background: var(--accent);
      color: #000;
      border: none;
      border-radius: 8px;
      width: 44px; height: 44px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      transition: all 0.2s;
      flex-shrink: 0;
      font-size: 1.1rem;
    }
    .send-btn:hover:not(:disabled) { background: #ff9a3d; transform: scale(1.05); }
    .send-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    .input-hint {
      text-align: center;
      font-size: 0.68rem;
      color: var(--muted);
      margin-top: 0.5rem;
    }

    /* welcome screen */
    .welcome {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      flex: 1;
      text-align: center;
      padding: 2rem;
      gap: 0.8rem;
    }

    .welcome-icon { font-size: 3rem; margin-bottom: 0.5rem; }
    .welcome h2  { font-size: 1.4rem; font-weight: 700; }
    .welcome p   { color: var(--muted); font-size: 0.88rem; max-width: 400px; line-height: 1.7; }
  </style>
</head>
<body>

  <header>
    <div class="logo">
      <div class="logo-icon">🌐</div>
      <div>
        <div class="logo-text">CF Network Assistant</div>
        <div class="logo-sub">Powered by Llama 3.3 · Cloudflare Workers AI</div>
      </div>
    </div>
    <div class="header-right">
      <span class="badge online" id="status-badge">● online</span>
      <button class="btn-reset" onclick="resetChat()">Clear chat</button>
    </div>
  </header>

  <div class="messages" id="messages">
    <div class="welcome" id="welcome">
      <div class="welcome-icon">🔒</div>
      <h2>Ask me anything about networking</h2>
      <p>DNS, CDN architecture, TLS, DDoS mitigation, HTTP protocols, edge computing — I'm here to help.</p>
    </div>
  </div>

  <div class="suggestions" id="suggestions">
    <button class="suggestion" onclick="sendSuggestion(this)">How does Cloudflare's CDN work?</button>
    <button class="suggestion" onclick="sendSuggestion(this)">Explain DNS resolution step by step</button>
    <button class="suggestion" onclick="sendSuggestion(this)">What is a DDoS attack and how is it mitigated?</button>
    <button class="suggestion" onclick="sendSuggestion(this)">How does TLS handshake work?</button>
    <button class="suggestion" onclick="sendSuggestion(this)">What are Durable Objects?</button>
  </div>

  <div class="input-area">
    <div class="input-row">
      <textarea
        id="input"
        placeholder="Ask a networking or infrastructure question..."
        rows="1"
        onkeydown="handleKey(event)"
        oninput="autoResize(this)"
      ></textarea>
      <button class="send-btn" id="send-btn" onclick="sendMessage()">➤</button>
    </div>
    <div class="input-hint">Enter to send · Shift+Enter for new line</div>
  </div>

  <script>
    // generate a session id for this browser tab
    // stored in sessionStorage so it resets on new tab
    let sessionId = sessionStorage.getItem('cf_session_id');
    if (!sessionId) {
      sessionId = crypto.randomUUID();
      sessionStorage.setItem('cf_session_id', sessionId);
    }

    // worker url - update this after deploying
    // in dev, wrangler serves on localhost:8787
    const API_BASE = window.location.hostname === 'localhost'
      ? 'http://localhost:8787'
      : '';   // same origin when deployed via pages

    let isLoading = false;

    function autoResize(el) {
      el.style.height = 'auto';
      el.style.height = Math.min(el.scrollHeight, 140) + 'px';
    }

    function handleKey(e) {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    }

    function sendSuggestion(btn) {
      document.getElementById('input').value = btn.textContent;
      sendMessage();
    }

    async function sendMessage() {
      if (isLoading) return;
      const input = document.getElementById('input');
      const text  = input.value.trim();
      if (!text) return;

      // hide welcome + suggestions on first message
      document.getElementById('welcome')?.remove();
      document.getElementById('suggestions').style.display = 'none';

      // add user bubble
      appendMessage('user', text);
      input.value = '';
      input.style.height = 'auto';

      // show typing indicator
      const typingEl = appendTyping();
      setLoading(true);

      try {
        const res = await fetch(`${API_BASE}/api/chat`, {
          method:  'POST',
          headers: {
            'Content-Type': 'application/json',
            'X-Session-Id': sessionId
          },
          body: JSON.stringify({ message: text })
        });

        const data = await res.json();
        typingEl.remove();

        if (data.error) {
          appendMessage('bot', `⚠️ Error: ${data.error}`);
        } else {
          appendMessage('bot', data.reply);
        }
      } catch (err) {
        typingEl.remove();
        appendMessage('bot', '⚠️ Could not reach the server. Make sure the Worker is running.');
        document.getElementById('status-badge').textContent = '● offline';
        document.getElementById('status-badge').classList.remove('online');
      } finally {
        setLoading(false);
      }
    }

    function appendMessage(role, text) {
      const msgs   = document.getElementById('messages');
      const div    = document.createElement('div');
      div.className = `message ${role === 'user' ? 'user' : 'bot'}`;

      const avatar = document.createElement('div');
      avatar.className = `avatar ${role === 'user' ? 'user-av' : 'bot-av'}`;
      avatar.textContent = role === 'user' ? 'S' : '🌐';

      const bubble = document.createElement('div');
      bubble.className = 'bubble';
      bubble.innerHTML = formatMessage(text);

      div.appendChild(avatar);
      div.appendChild(bubble);
      msgs.appendChild(div);
      msgs.scrollTop = msgs.scrollHeight;
      return div;
    }

    function appendTyping() {
      const msgs = document.getElementById('messages');
      const div  = document.createElement('div');
      div.className = 'message bot typing';
      div.innerHTML = `
        <div class="avatar bot-av">🌐</div>
        <div class="bubble">
          <div class="dot"></div>
          <div class="dot"></div>
          <div class="dot"></div>
        </div>`;
      msgs.appendChild(div);
      msgs.scrollTop = msgs.scrollHeight;
      return div;
    }

    function formatMessage(text) {
      // very basic markdown-ish formatting
      // code blocks
      text = text.replace(/```(\w*)\n?([\s\S]*?)```/g, (_, lang, code) =>
        `<pre><code>${escHtml(code.trim())}</code></pre>`);
      // inline code
      text = text.replace(/`([^`]+)`/g, (_, c) => `<code>${escHtml(c)}</code>`);
      // bold
      text = text.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
      // newlines
      text = text.replace(/\n/g, '<br>');
      return text;
    }

    function escHtml(str) {
      return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    function setLoading(val) {
      isLoading = val;
      document.getElementById('send-btn').disabled = val;
    }

    async function resetChat() {
      await fetch(`${API_BASE}/api/reset`, {
        method:  'DELETE',
        headers: { 'X-Session-Id': sessionId }
      }).catch(() => {});

      // new session id
      sessionId = crypto.randomUUID();
      sessionStorage.setItem('cf_session_id', sessionId);

      // clear ui
      const msgs = document.getElementById('messages');
      msgs.innerHTML = '';
      document.getElementById('suggestions').style.display = 'flex';
    }
  </script>

</body>
</html>
